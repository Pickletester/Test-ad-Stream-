<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=845, initial-scale=1.0">
<title>Ad Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 845px; height: 314px; overflow: hidden; background: #000; }
  #player { position: relative; width: 845px; height: 314px; background: #000; }
  .slide { position: absolute; top: 0; left: 0; width: 845px; height: 314px; }
  .slide img { width: 845px; height: 314px; object-fit: cover; display: block; }
  .slide video { width: 845px; height: 314px; object-fit: cover; display: block; background: #000; }
  #error { display: none; color: #fff; font-family: sans-serif; font-size: 14px; text-align: center; padding-top: 140px; }
</style>
</head>
<body>
<div id="player">
  <div id="error">Could not load ads.json — check the file exists in the ads/ folder.</div>
</div>
<script>
const ADS_FOLDER = "ads/";
const DEFAULT_IMAGE_DURATION = 10;
const player = document.getElementById("player");
const errorEl = document.getElementById("error");
var adList = [];
var current = 0;
var timer = null;
var currentEl = null;
var preloadImg = null;

function isVideo(f) { return /\.(mp4|webm)$/i.test(f); }

function preloadNext(index) {
  var next = (index + 1) % adList.length;
  var item = adList[next];
  if (!isVideo(item.file)) {
    preloadImg = new Image();
    preloadImg.src = ADS_FOLDER + encodeURIComponent(item.file);
  }
}

function showSlide(index) {
  clearTimeout(timer);

  // Destroy previous element to free memory
  if (currentEl) {
    var oldVid = currentEl.querySelector("video");
    if (oldVid) { oldVid.pause(); oldVid.removeAttribute("src"); oldVid.load(); }
    currentEl.remove();
    currentEl = null;
  }

  var item = adList[index];
  var div = document.createElement("div");
  div.className = "slide";

  if (isVideo(item.file)) {
    var vid = document.createElement("video");
    vid.src = ADS_FOLDER + encodeURIComponent(item.file);
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = "auto";
    vid.addEventListener("ended", advance);
    vid.addEventListener("error", function() { timer = setTimeout(advance, 1000); });
    div.appendChild(vid);
    player.appendChild(div);
    currentEl = div;
    vid.play().catch(function() { timer = setTimeout(advance, 5000); });
    preloadNext(index);
  } else {
    var img = document.createElement("img");
    var src = ADS_FOLDER + encodeURIComponent(item.file);

    // If already preloaded, show instantly — otherwise wait for load
    if (preloadImg && preloadImg.src.indexOf(encodeURIComponent(item.file)) !== -1 && preloadImg.complete) {
      img.src = src;
      div.appendChild(img);
      player.appendChild(div);
      currentEl = div;
      preloadNext(index);
      timer = setTimeout(advance, (item.duration || DEFAULT_IMAGE_DURATION) * 1000);
    } else {
      img.src = src;
      img.onload = function() {
        div.appendChild(img);
        player.appendChild(div);
        currentEl = div;
        preloadNext(index);
        timer = setTimeout(advance, (item.duration || DEFAULT_IMAGE_DURATION) * 1000);
      };
      img.onerror = function() { advance(); };
    }
  }
}

function advance() { current = (current + 1) % adList.length; showSlide(current); }

fetch("ads/ads.json?nocache=" + Date.now())
  .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
  .then(function(data) { if (!data.ads || !data.ads.length) throw new Error("empty"); adList = data.ads; showSlide(0); })
  .catch(function(err) { console.error(err); errorEl.style.display = "block"; });
</script>
</body>
</html>
