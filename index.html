<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=845, initial-scale=1.0">
<title>Ad Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 845px; height: 314px; overflow: hidden; background: #000; }
  #player { position: relative; width: 845px; height: 314px; background: #000; }
  .slide {
    position: absolute; top: 0; left: 0;
    width: 845px; height: 314px;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }
  .slide.visible { opacity: 1; }
  .slide img { width: 845px; height: 314px; object-fit: cover; display: block; }
  .slide video { width: 845px; height: 314px; object-fit: cover; display: block; background: #000; }
  #error { display: none; color: #fff; font-family: sans-serif; font-size: 14px; text-align: center; padding-top: 140px; }
</style>
</head>
<body>
<div id="player">
  <div id="error">Could not load ads.json</div>
</div>
<script>
var ADS_FOLDER = "ads/";
var DEFAULT_IMAGE_DURATION = 10;
var LOAD_TIMEOUT_MS = 8000;
var PRELOAD_AHEAD = 2;

var player = document.getElementById("player");
var errorEl = document.getElementById("error");

var adList = [];
var currentEl = null;
var advanceTimer = null;
var loadTimer = null;
var cycleLength = 0;
var offsets = [];
var imageCache = {};

function isVideo(f) { return /\.(mp4|webm)$/i.test(f); }

// Get duration for a slot (rotate or normal)
function getSlotDuration(item) {
  if (item.rotate) return item.duration || DEFAULT_IMAGE_DURATION;
  return isVideo(item.file)
    ? (item.duration || 30)
    : (item.duration || DEFAULT_IMAGE_DURATION);
}

// For rotate slots: pick which file based on how many full cycles have passed
// Same math on every board = always in sync
function getRotateFile(item) {
  var now = Math.floor(Date.now() / 1000);
  var totalCycles = Math.floor(now / cycleLength);
  var pick = totalCycles % item.files.length;
  return item.files[pick];
}

// Resolve the actual filename for any slot
function resolveFile(item) {
  return item.rotate ? getRotateFile(item) : item.file;
}

function buildOffsets() {
  cycleLength = 0;
  offsets = [];
  for (var i = 0; i < adList.length; i++) {
    offsets.push(cycleLength);
    cycleLength += getSlotDuration(adList[i]);
  }
}

function getCurrentIndex() {
  var pos = Math.floor(Date.now() / 1000) % cycleLength;
  var idx = 0;
  for (var i = offsets.length - 1; i >= 0; i--) {
    if (pos >= offsets[i]) { idx = i; break; }
  }
  return idx;
}

function getMsRemaining(index) {
  var pos = Math.floor(Date.now() / 1000) % cycleLength;
  var dur = getSlotDuration(adList[index]);
  var elapsed = pos - offsets[index];
  return Math.max((dur - elapsed) * 1000, 500);
}

function clearTimers() {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  if (loadTimer)    { clearTimeout(loadTimer);    loadTimer = null; }
}

function preloadUpcoming(currentIndex) {
  for (var i = 1; i <= PRELOAD_AHEAD; i++) {
    var nextIdx = (currentIndex + i) % adList.length;
    var file = resolveFile(adList[nextIdx]);
    if (!imageCache[file] && !isVideo(file)) {
      var img = new Image();
      img.src = ADS_FOLDER + encodeURIComponent(file);
      imageCache[file] = img;
    }
  }
}

function getOrLoadImage(file, onLoad, onError) {
  var src = ADS_FOLDER + encodeURIComponent(file);
  if (imageCache[file] && imageCache[file].complete && imageCache[file].naturalWidth > 0) {
    onLoad(imageCache[file]);
    return;
  }
  var img = imageCache[file] || new Image();
  imageCache[file] = img;
  img.onload = function() { onLoad(img); };
  img.onerror = function() { delete imageCache[file]; onError(); };
  if (!img.src) img.src = src;
}

function showSlide(index) {
  clearTimers();

  var item = adList[index];
  var file = resolveFile(item);
  var dur = getSlotDuration(item);

  if (isVideo(file)) {
    // Destroy old
    if (currentEl) {
      var oldVid = currentEl.querySelector("video");
      if (oldVid) { oldVid.pause(); oldVid.removeAttribute("src"); oldVid.load(); }
      currentEl.remove();
      currentEl = null;
    }

    var div = document.createElement("div");
    div.className = "slide";
    var vid = document.createElement("video");
    vid.src = ADS_FOLDER + encodeURIComponent(file);
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = "auto";
    vid.addEventListener("canplay", function() {
      div.classList.add("visible");
      vid.play().catch(function() {});
    });
    vid.addEventListener("ended", checkAndAdvance);
    vid.addEventListener("error", checkAndAdvance);
    div.appendChild(vid);
    player.appendChild(div);
    currentEl = div;
    preloadUpcoming(index);
    advanceTimer = setTimeout(checkAndAdvance, getMsRemaining(index) + 500);

  } else {
    loadTimer = setTimeout(function() {
      console.warn("Timeout loading:", file);
      delete imageCache[file];
      checkAndAdvance();
    }, LOAD_TIMEOUT_MS);

    getOrLoadImage(file,
      function(img) {
        clearTimeout(loadTimer);
        loadTimer = null;

        var div = document.createElement("div");
        div.className = "slide";
        var imgEl = document.createElement("img");
        imgEl.src = img.src;
        div.appendChild(imgEl);
        player.appendChild(div);

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            div.classList.add("visible");
          });
        });

        if (currentEl) {
          var old = currentEl;
          setTimeout(function() {
            old.classList.remove("visible");
            setTimeout(function() { old.remove(); }, 350);
          }, 50);
        }

        currentEl = div;
        preloadUpcoming(index);
        advanceTimer = setTimeout(checkAndAdvance, getMsRemaining(index));
      },
      function() {
        clearTimeout(loadTimer);
        loadTimer = null;
        console.warn("Error loading:", file);
        advanceTimer = setTimeout(checkAndAdvance, 500);
      }
    );
  }
}

function checkAndAdvance() {
  clearTimers();
  showSlide(getCurrentIndex());
}

fetch("ads/ads.json?nocache=" + Date.now())
  .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
  .then(function(data) {
    if (!data.ads || !data.ads.length) throw new Error("empty");
    adList = data.ads;
    buildOffsets();

    var started = false;
    function tryStart() {
      if (started) return;
      started = true;
      var msUntilNextSecond = 1000 - (Date.now() % 1000);
      setTimeout(checkAndAdvance, msUntilNextSecond);
    }

    var loaded = 0;
    adList.forEach(function(ad, i) {
      var file = resolveFile(ad);
      if (isVideo(file)) { loaded++; if (loaded === adList.length) tryStart(); return; }
      var img = new Image();
      img.onload = img.onerror = function() {
        loaded++;
        if (i === getCurrentIndex() || loaded === adList.length) tryStart();
      };
      img.src = ADS_FOLDER + encodeURIComponent(file);
      imageCache[file] = img;
    });

    setTimeout(tryStart, 3000);
  })
  .catch(function(err) {
    console.error(err);
    errorEl.style.display = "block";
  });
</script>
</body>
</html>
