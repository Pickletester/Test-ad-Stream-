<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=845, initial-scale=1.0">
<title>Ad Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 845px; height: 314px; overflow: hidden; background: #000; }
  #player { position: relative; width: 845px; height: 314px; background: #000; }
  .slide { position: absolute; top: 0; left: 0; width: 845px; height: 314px; }
  .slide img { width: 845px; height: 314px; object-fit: cover; display: block; }
  .slide video { width: 845px; height: 314px; object-fit: cover; display: block; background: #000; }
  #error { display: none; color: #fff; font-family: sans-serif; font-size: 14px; text-align: center; padding-top: 140px; }
</style>
</head>
<body>
<div id="player">
  <div id="error">Could not load ads.json — check the file exists in the ads/ folder.</div>
</div>
<script>
const ADS_FOLDER = "ads/";
const DEFAULT_IMAGE_DURATION = 10;
const player = document.getElementById("player");
const errorEl = document.getElementById("error");
var adList = [];
var currentEl = null;
var preloadImg = null;
var cycleLength = 0; // total seconds for one full loop of all ads
var offsets = [];    // start time (in seconds) of each ad within the cycle

function isVideo(f) { return /\.(mp4|webm)$/i.test(f); }

function buildOffsets() {
  cycleLength = 0;
  offsets = [];
  for (var i = 0; i < adList.length; i++) {
    offsets.push(cycleLength);
    // Videos get a fixed slot — use duration field or default 30s for video
    var dur = isVideo(adList[i].file)
      ? (adList[i].duration || 30)
      : (adList[i].duration || DEFAULT_IMAGE_DURATION);
    cycleLength += dur;
  }
}

// Returns which ad index should be showing RIGHT NOW based on the clock
function getCurrentIndex() {
  var now = Math.floor(Date.now() / 1000); // unix seconds
  var pos = now % cycleLength;             // position within the cycle
  var idx = 0;
  for (var i = offsets.length - 1; i >= 0; i--) {
    if (pos >= offsets[i]) { idx = i; break; }
  }
  return idx;
}

// Returns how many milliseconds are LEFT for the current ad
function getMsRemaining(index) {
  var now = Math.floor(Date.now() / 1000);
  var pos = now % cycleLength;
  var dur = isVideo(adList[index].file)
    ? (adList[index].duration || 30)
    : (adList[index].duration || DEFAULT_IMAGE_DURATION);
  var elapsed = pos - offsets[index];
  return Math.max((dur - elapsed) * 1000, 500);
}

function preloadNext(index) {
  var next = (index + 1) % adList.length;
  var item = adList[next];
  if (!isVideo(item.file)) {
    preloadImg = new Image();
    preloadImg.src = ADS_FOLDER + encodeURIComponent(item.file);
  }
}

function showSlide(index) {
  // Destroy previous
  if (currentEl) {
    var oldVid = currentEl.querySelector("video");
    if (oldVid) { oldVid.pause(); oldVid.removeAttribute("src"); oldVid.load(); }
    currentEl.remove();
    currentEl = null;
  }

  var item = adList[index];
  var div = document.createElement("div");
  div.className = "slide";
  var msLeft = getMsRemaining(index);

  if (isVideo(item.file)) {
    var vid = document.createElement("video");
    vid.src = ADS_FOLDER + encodeURIComponent(item.file);
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = "auto";

    // Seek into the video to match where we are in the cycle
    var now = Math.floor(Date.now() / 1000);
    var pos = now % cycleLength;
    var elapsed = pos - offsets[index];
    vid.addEventListener("loadedmetadata", function() {
      if (elapsed > 0 && elapsed < vid.duration) vid.currentTime = elapsed;
      vid.play().catch(function() {});
    });
    vid.addEventListener("ended", checkAndAdvance);
    vid.addEventListener("error", checkAndAdvance);
    div.appendChild(vid);
    player.appendChild(div);
    currentEl = div;
    preloadNext(index);
    // Fallback timer in case video ends before clock says to switch
    setTimeout(checkAndAdvance, msLeft + 500);
  } else {
    var img = document.createElement("img");
    var src = ADS_FOLDER + encodeURIComponent(item.file);
    img.src = src;
    img.onload = function() {
      div.appendChild(img);
      player.appendChild(div);
      currentEl = div;
      preloadNext(index);
      setTimeout(checkAndAdvance, getMsRemaining(index));
    };
    img.onerror = function() { checkAndAdvance(); };
  }
}

// Always re-check the clock before advancing — keeps everything honest
function checkAndAdvance() {
  var idx = getCurrentIndex();
  showSlide(idx);
}

fetch("ads/ads.json?nocache=" + Date.now())
  .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
  .then(function(data) {
    if (!data.ads || !data.ads.length) throw new Error("empty");
    adList = data.ads;
    buildOffsets();
    // Wait until the next clean second boundary so first load lands in sync
    var msUntilNextSecond = 1000 - (Date.now() % 1000);
    setTimeout(function() {
      var idx = getCurrentIndex();
      showSlide(idx);
    }, msUntilNextSecond);
  })
  .catch(function(err) { console.error(err); errorEl.style.display = "block"; });
</script>
</body>
</html>
